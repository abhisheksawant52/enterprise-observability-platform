apiVersion: apps/v1
kind: Deployment
metadata:
  name: observability-platform
  namespace: observability
  labels:
    app.kubernetes.io/name: observability-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: observability-platform
  template:
    metadata:
      labels:
        app.kubernetes.io/name: observability-platform
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: /metrics
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: observability-platform
          image: ghcr.io/abhisheksawant52/enterprise-observability-platform:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: OBS_SERVICE_NAME
              value: observability-platform
            - name: OBS_ENV
              value: prod
            - name: OBS_LOG_LEVEL
              value: INFO
            - name: OBS_OTLP_ENDPOINT
              value: http://otel-collector:4317
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
