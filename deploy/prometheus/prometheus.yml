# Prometheus scrape configuration for the observability platform.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: observability-platform
    metrics_path: /metrics
    static_configs:
      - targets: ["observability-platform:8000"]
        labels:
          service: observability-platform

  - job_name: otel-collector
    metrics_path: /metrics
    static_configs:
      - targets: ["otel-collector:9464"]
        labels:
          service: otel-collector
